name: Sync Articles to Platforms

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: article-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp pubDate for newly added articles
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          # Find article files that were newly added (status A) in this push
          # Guard against shallow/first-commit repos where HEAD~1 may not exist
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            DIFF_CMD="git diff --name-status HEAD~1 HEAD"
          else
            DIFF_CMD="git show --name-status --format= HEAD"
          fi
          $DIFF_CMD | grep -E '^A\s+src/content/articles/.+\.(md|mdx)$' | cut -f2 | while IFS= read -r file; do
            echo "Stamping pubDate=$TODAY on $file"
            ARTICLE_FILE="$file" TODAY="$TODAY" node -e "
              const fs = require('fs');
              const file = process.env.ARTICLE_FILE;
              const today = process.env.TODAY;
              const content = fs.readFileSync(file, 'utf8');
              const updated = content.replace(/^pubDate:.*\$/m, 'pubDate: ' + today);
              if (updated !== content) fs.writeFileSync(file, updated);
            "
          done

      - name: Sync to DEV.to
        continue-on-error: true
        run: node scripts/sync-devto.mjs
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

      - name: Sync to Hashnode
        continue-on-error: true
        run: node scripts/sync-hashnode.mjs
        env:
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}

      - name: Commit updated frontmatter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/articles/
          git diff --staged --quiet || git commit -m "chore: update article sync IDs in frontmatter [skip ci]"
          git push
