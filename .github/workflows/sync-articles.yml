name: Sync Articles to Platforms

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: article-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp pubDate for newly added articles
        run: |
          BEFORE="${{ github.event.before }}"
          # Null SHA means first push — compare against empty tree
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git hash-object -t tree /dev/null)
          fi
          # Find article files Added in this push (full range, not just HEAD~1)
          git diff --name-status "$BEFORE" HEAD | grep -E '^A\s+src/content/articles/.+\.(md|mdx)$' | cut -f2 | while IFS= read -r file; do
            # Use the file's first-commit date as pubDate (when it entered the repo)
            FIRST_DATE=$(git log --diff-filter=A --format=%as -- "$file" | tail -1)
            if [ -z "$FIRST_DATE" ]; then
              FIRST_DATE=$(date -u +"%Y-%m-%d")
            fi
            echo "Stamping pubDate=$FIRST_DATE on $file"
            ARTICLE_FILE="$file" PUB_DATE="$FIRST_DATE" node -e "
              const fs = require('fs');
              const file = process.env.ARTICLE_FILE;
              const pubDate = process.env.PUB_DATE;
              const content = fs.readFileSync(file, 'utf8');
              const updated = content.replace(/^pubDate:.*\$/m, 'pubDate: ' + pubDate);
              if (updated !== content) fs.writeFileSync(file, updated);
            "
          done

      - name: Sync to DEV.to
        continue-on-error: true
        run: node scripts/sync-devto.mjs
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

      - name: Sync to Hashnode
        continue-on-error: true
        run: node scripts/sync-hashnode.mjs
        env:
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}

      - name: Commit updated frontmatter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/articles/
          git diff --staged --quiet || git commit -m "chore: update article sync IDs in frontmatter [skip ci]"
          git push
